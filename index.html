<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ímpetu - Solana Fitness</title>
    <script>
      // Gracefully handle benign third-party/extension errors trying to patch window.fetch
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('Cannot set property fetch') || 
          event.message.includes('only a getter')
        )) {
          event.stopImmediatePropagation();
          event.preventDefault();
          return true;
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && event.reason.message && (
          event.reason.message.includes('Cannot set property fetch') || 
          event.reason.message.includes('only a getter')
        )) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
